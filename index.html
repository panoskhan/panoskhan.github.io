    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --dark-bg: #0f1419;
            --slate-bg: #1a1f2e;
            --slate-light: #252d3d;
            --white-primary: #f5f7fa;
            --white-secondary: #e0e6ed;
            --accent-blue: #00d4ff;
            --accent-mint: #00f0a0;
            --text-muted: #8b94a5;
            --border-subtle: #2a3142;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background-color: var(--dark-bg);
            color: var(--white-primary);
            line-height: 1.6;
            overflow-x: hidden;
        }

        nav {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(15, 20, 25, 0.95);
            backdrop-filter: blur(10px);
            z-index: 1000;
            border-bottom: 1px solid var(--border-subtle);
            padding: 1rem 2rem;
        }

        nav .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1400px;
            margin: 0 auto;
        }

        nav .logo {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-mint));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        nav .nav-links {
            display: flex;
            gap: 2rem;
            list-style: none;
        }

        nav .nav-links a {
            color: var(--white-secondary);
            text-decoration: none;
            font-size: 0.95rem;
            transition: color 0.3s ease;
        }

        nav .nav-links a:hover {
            color: var(--accent-blue);
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 2rem;
        }

        .hero {
            margin-top: 80px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            background: linear-gradient(135deg, var(--dark-bg) 0%, var(--slate-bg) 100%);
            position: relative;
            overflow: hidden;
        }

        .hero-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4rem;
            align-items: center;
            position: relative;
            z-index: 1;
            width: 100%;
        }

        .hero-text h1 {
            font-size: 3.5rem;
            font-weight: 800;
            margin-bottom: 1rem;
            line-height: 1.1;
        }

        .hero-text .subtitle {
            font-size: 1.5rem;
            color: var(--accent-blue);
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .hero-text .location {
            font-size: 0.95rem;
            color: var(--text-muted);
            margin-bottom: 2rem;
        }

        .hero-text p {
            font-size: 1.1rem;
            color: var(--white-secondary);
            margin-bottom: 2.5rem;
            line-height: 1.8;
        }

        .hero-buttons {
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
        }

        .btn {
            padding: 0.875rem 2rem;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-mint));
            color: var(--dark-bg);
            box-shadow: 0 8px 32px rgba(0, 212, 255, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: transparent;
            color: var(--accent-blue);
            border: 2px solid var(--accent-blue);
        }

        .btn-secondary:hover {
            background: rgba(0, 212, 255, 0.1);
            transform: translateY(-2px);
        }

        .hero-asset-container {
            position: relative;
            height: 450px;
            background: rgba(26, 31, 46, 0.6);
            border-radius: 12px;
            border: 1px solid var(--border-subtle);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #ai-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .canvas-overlay-text {
            position: relative;
            z-index: 2;
            text-align: center;
            pointer-events: none;
        }

        .canvas-overlay-text h3 {
            font-size: 1.2rem;
            color: var(--white-primary);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 1rem;
        }

        .btn-3d-toggle {
            position: absolute;
            bottom: 20px;
            right: 20px;
            z-index: 3;
            background: rgba(15, 20, 25, 0.8);
            border: 1px solid var(--accent-mint);
            color: var(--accent-mint);
            padding: 0.5rem 1rem;
            font-size: 0.85rem;
            border-radius: 4px;
            cursor: pointer;
            backdrop-filter: blur(5px);
            transition: all 0.3s ease;
        }

        .btn-3d-toggle:hover {
            background: var(--accent-mint);
            color: var(--dark-bg);
            box-shadow: 0 0 15px var(--accent-mint);
        }

        /* Footer Networks Links Stylesheet */
        footer {
            background-color: var(--dark-bg);
            border-top: 1px solid var(--border-subtle);
            padding: 3rem 2rem;
            margin-top: 4rem;
        }
        
        .footer-grid {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            align-items: center;
        }
        
        .footer-title {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-muted);
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        
        .footer-links {
            display: flex;
            flex-wrap: wrap;
            gap: 1.5rem;
            justify-content: center;
            list-style: none;
        }
        
        .footer-links a {
            color: var(--white-secondary);
            text-decoration: none;
            font-size: 0.95rem;
            transition: color 0.3s ease;
        }
        
        .footer-links a:hover {
            color: var(--accent-blue);
        }
    </style>
</head>
