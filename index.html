    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --dark-bg: #0f1419;
            --slate-bg: #1a1f2e;
            --slate-light: #252d3d;
            --white-primary: #f5f7fa;
            --white-secondary: #e0e6ed;
            --accent-blue: #00d4ff;
            --accent-mint: #00f0a0;
            --text-muted: #8b94a5;
            --border-subtle: #2a3142;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background-color: var(--dark-bg);
            color: var(--white-primary);
            line-height: 1.6;
            overflow-x: hidden;
        }

        nav {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(15, 20, 25, 0.95);
            backdrop-filter: blur(10px);
            z-index: 1000;
            border-bottom: 1px solid var(--border-subtle);
            padding: 1rem 2rem;
        }

        nav .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1400px;
            margin: 0 auto;
        }

        nav .logo {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-mint));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        nav .nav-links {
            display: flex;
            gap: 2rem;
            list-style: none;
        }

        nav .nav-links a {
            color: var(--white-secondary);
            text-decoration: none;
            font-size: 0.95rem;
            transition: color 0.3s ease;
        }

        nav .nav-links a:hover {
            color: var(--accent-blue);
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 2rem;
        }

        .hero {
            margin-top: 80px;
            min-height: 85vh;
            display: flex;
            align-items: center;
            background: linear-gradient(135deg, var(--dark-bg) 0%, var(--slate-bg) 100%);
            position: relative;
            overflow: hidden;
            padding: 4rem 0;
        }

        .hero-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4rem;
            align-items: center;
            position: relative;
            z-index: 1;
            width: 100%;
        }

        @media (max-width: 968px) {
            .hero-content {
                grid-template-columns: 1fr;
                gap: 2rem;
            }
        }

        .hero-text h1 {
            font-size: 3.5rem;
            font-weight: 800;
            margin-bottom: 1rem;
            line-height: 1.1;
        }

        .hero-text .subtitle {
            font-size: 1.5rem;
            color: var(--accent-blue);
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .hero-text .location {
            font-size: 0.95rem;
            color: var(--text-muted);
            margin-bottom: 2rem;
        }

        .hero-text p {
            font-size: 1.1rem;
            color: var(--white-secondary);
            margin-bottom: 2.5rem;
            line-height: 1.8;
        }

        .hero-buttons {
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
        }

        .btn {
            padding: 0.875rem 2rem;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-mint));
            color: var(--dark-bg);
            box-shadow: 0 8px 32px rgba(0, 212, 255, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: transparent;
            color: var(--accent-blue);
            border: 2px solid var(--accent-blue);
        }

        .btn-secondary:hover {
            background: rgba(0, 212, 255, 0.1);
            transform: translateY(-2px);
        }

        .hero-asset-container {
            position: relative;
            min-height: 400px;
            background: rgba(26, 31, 46, 0.6);
            border-radius: 12px;
            border: 1px solid var(--border-subtle);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .section-title {
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 2rem;
            text-align: center;
            background: linear-gradient(135deg, #ffffff, var(--text-muted));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .section-padding {
            padding: 6rem 0;
            border-top: 1px solid var(--border-subtle);
        }

        /* Responsive Grids */
        .services-grid, .profiles-grid, .publications-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
        }

        .profile-card, .service-card, .pub-card {
            background: var(--slate-bg);
            border: 1px solid var(--border-subtle);
            border-radius: 12px;
            padding: 2rem;
            text-decoration: none;
            color: var(--white-primary);
            transition: all 0.3s ease;
        }

        .profile-card:hover, .service-card:hover, .pub-card:hover {
            border-color: var(--accent-blue);
            transform: translateY(-4px);
            background: var(--slate-light);
        }

        .card-icon {
            font-size: 1.5rem;
            color: var(--accent-mint);
            margin-bottom: 1rem;
        }

        .profile-card h3, .service-card h3, .pub-card h3 {
            font-size: 1.3rem;
            margin-bottom: 0.5rem;
            color: #fff;
        }

        .profile-card p, .service-card p, .pub-card p {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        /* Widget Container Styling */
        .joke-widget {
            background: var(--dark-bg);
            border: 1px dashed var(--accent-blue);
            padding: 1.5rem;
            border-radius: 8px;
            width: 100%;
            text-align: center;
            margin-top: 1rem;
        }

        #joke-display {
            min-height: 60px;
            font-size: 0.95rem;
            color: var(--white-secondary);
            margin-bottom: 1rem;
        }
    </style>
</head>
