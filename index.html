    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --dark-bg: #0f1419;
            --slate-bg: #1a1f2e;
            --slate-light: #252d3d;
            --white-primary: #f5f7fa;
            --white-secondary: #e0e6ed;
            --accent-blue: #00d4ff;
            --accent-mint: #00f0a0;
            --text-muted: #8b94a5;
            --border-subtle: #2a3142;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background-color: var(--dark-bg);
            color: var(--white-primary);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* 3D Dynamic Engine Background Placement Container */
        #neural-canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            pointer-events: none;
            opacity: 0.65;
        }

        nav {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(15, 20, 25, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            z-index: 1000;
            border-bottom: 1px solid var(--border-subtle);
            padding: 1.2rem 2rem;
        }

        nav .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto;
        }

        nav .logo {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: 1px;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-mint));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        nav .nav-links {
            display: flex;
            gap: 2.5rem;
            list-style: none;
        }

        nav .nav-links a {
            color: var(--white-secondary);
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        nav .nav-links a:hover {
            color: var(--accent-blue);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem;
            position: relative;
            z-index: 1;
        }

        .hero {
            padding-top: 140px;
            padding-bottom: 60px;
            min-height: 85vh;
            display: flex;
            align-items: center;
        }

        .hero-content {
            width: 100%;
        }

        .hero-text h1 {
            font-size: 4rem;
            font-weight: 800;
            margin-bottom: 1rem;
            line-height: 1.1;
            letter-spacing: -1px;
        }

        .hero-text .subtitle {
            font-size: 1.6rem;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-mint));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .hero-text .location {
            font-size: 1rem;
            color: var(--text-muted);
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .hero-text p {
            font-size: 1.2rem;
            color: var(--white-secondary);
            margin-bottom: 2.5rem;
            max-width: 750px;
            line-height: 1.8;
        }

        section {
            padding: 80px 0;
        }

        h2 {
            font-size: 2.2rem;
            font-weight: 800;
            margin-bottom: 2.5rem;
            position: relative;
            display: inline-block;
        }

        h2::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 0;
            width: 60px;
            height: 4px;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-mint));
            border-radius: 2px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 2rem;
        }

        .card {
            background: rgba(26, 31, 46, 0.45);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid var(--border-subtle);
            border-radius: 12px;
            padding: 2.5rem;
            text-decoration: none;
            color: var(--white-primary);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: var(--accent-blue);
            box-shadow: 0 12px 40px rgba(0, 212, 255, 0.15);
            background: rgba(26, 31, 46, 0.75);
        }

        .card h3 {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 1rem;
            color: #ffffff;
        }

        .card p {
            color: var(--white-secondary);
            font-size: 1rem;
            line-height: 1.6;
        }

        .card .tech-tag {
            margin-top: auto;
            padding-top: 1.5rem;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--accent-mint);
        }

        footer {
            border-top: 1px solid var(--border-subtle);
            padding: 3rem 0;
            text-align: center;
            color: var(--text-muted);
            font-size: 0.95rem;
            background: rgba(15, 20, 25, 0.9);
            position: relative;
            z-index: 1;
        }

        @media (max-width: 768px) {
            .hero-text h1 { font-size: 2.8rem; }
            .hero-text .subtitle { font-size: 1.3rem; }
            nav .nav-links { display: none; }
            section { padding: 50px 0; }
        }
    </style>
</head>
<body>

    <!-- Target Frame Core Node Injector for Three.js Dynamic Neural Canvas -->
    <div id="neural-canvas-container"></div>

    <nav>
        <div class="container">
            <div class="logo">PANOS KHAN</div>
            <ul class="nav-links">
                <li><a href="#about">About</a></li>
                <li><a href="#services">Services</a></li>
                <li><a href="#profiles">Networks</a></li>
            </ul>
        </div>
    </nav>

    <main>
        <section class="hero" id="about">
            <div class="container">
                <div class="hero-content">
                    <div class="hero-text">
                        <p class="subtitle">AI & Digital Transformation Consultant</p>
                        <h1>Panos Khan</h1>
                        <div class="location">📍 Athens, Greece | Global Operations</div>
